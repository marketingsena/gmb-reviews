<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leave a Review</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;
background:linear-gradient(135deg,#f1f5ff,#eef2ff);
padding:20px;
}

.container{
max-width:560px;
margin:auto;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(20px);
padding:28px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
text-align:center;
font-weight:600;
font-size:22px;
margin-bottom:4px;
}

.subtitle{
text-align:center;
color:#6b7280;
font-size:14px;
margin-bottom:20px;
}

.services{
border:1px solid #e5e7eb;
border-radius:12px;
padding:14px;
max-height:220px;
overflow:auto;
}

.services label{
display:block;
margin-bottom:8px;
font-size:14px;
}

input[type=text]{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #e5e7eb;
margin-top:12px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#2563eb;
color:white;
font-weight:600;
font-size:16px;
margin-top:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.status{
text-align:center;
margin-top:16px;
font-weight:600;
}

textarea{
width:100%;
height:140px;
margin-top:14px;
border-radius:12px;
border:1px solid #e5e7eb;
padding:12px;
background:#f9fafb;
}

</style>
</head>

<body>

<div class="container">

<h1>Share Your Experience</h1>
<div class="subtitle">Your review will be generated automatically</div>

<form id="reviewForm">
  <div class="section">
    <label>Select services</label>
    <div class="note">You can select multiple services</div>

<div class="services">

<label><input type="checkbox" name="services" value="GMB Management"> GMB Management</label>
<label><input type="checkbox" name="services" value="Local SEO"> Local SEO</label>
<label><input type="checkbox" name="services" value="SEO"> SEO</label>
<label><input type="checkbox" name="services" value="Social Media Marketing"> Social Media Marketing</label>
<label><input type="checkbox" name="services" value="Website Development"> Website Development</label>
<label><input type="checkbox" name="services" value="Facebook & Instagram Ads"> Facebook & Instagram Ads</label>
<label><input type="checkbox" name="services" value="Lead Generation"> Lead Generation</label>

</div>

<input type="text" id="location" placeholder="Your City / Area">

<button id="generateBtn" type="submit">Generate My Review</button>

</form>

<div id="status" class="status"></div>

<textarea id="review" readonly placeholder="Your review will appear here"></textarea>

</div>

<script>

const webhookURL="https://hook.us2.make.com/0gkgw9kdw46a3csmg5dqn9jqug03y1go";

const googleURL="https://search.google.com/local/writereview?placeid=ChIJQWh0uNEbw2MRWT7vlIaLRLQ";

const used = localStorage.getItem("reviewGenerated");

if (used) {
document.getElementById("reviewForm").style.display="none";
document.getElementById("status").innerText="Review already generated on this device.";
}

document.getElementById("reviewForm").addEventListener("submit",async e=>{
e.preventDefault();

const status=document.getElementById("status");

status.innerText="Generating your review...";

const services=[...document.querySelectorAll("input[name=services]:checked")].map(i=>i.value);

if(!services.length){
alert("Please select at least one service");
status.innerText="";
return;
}

try{

const r=await fetch(webhookURL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
services,
location:location.value
})
});

let text=await r.text();

text=text.trim();

if(!text) throw "Empty";

review.value=text;

await navigator.clipboard.writeText(text);

status.innerText="✅ Review copied successfully! Opening Google review...";

localStorage.setItem("reviewGenerated","yes");

document.getElementById("generateBtn").style.display="none";

document.getElementById("reviewForm").style.display="none";

setTimeout(()=>{
window.open(googleURL,"_blank");
},1500);

}catch(err){

status.innerText="Something went wrong. Please try again.";

}

});

</script>

</body>
</html>
