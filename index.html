<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Google Review</title>

<style>

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#eef2ff,#f8fafc);
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

h1{text-align:center;font-size:22px;margin-bottom:5px;}
.subtitle{text-align:center;color:#666;font-size:14px;margin-bottom:20px;}

.services{
border:1px solid #eee;
padding:15px;
border-radius:12px;
max-height:230px;
overflow:auto;
}

.services label{display:block;margin-bottom:6px;}

input[type=text]{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-top:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:600;
margin-top:15px;
cursor:pointer;
}

textarea{
width:100%;
height:140px;
margin-top:15px;
padding:12px;
border-radius:12px;
border:1px solid #eee;
background:#f9fafb;
}

.status{
text-align:center;
margin-top:15px;
font-weight:600;
color:#16a34a;
}

.popup{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#111827;
color:white;
padding:14px 18px;
border-radius:12px;
font-size:14px;
display:none;
z-index:1000;
}

#confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="container">

<h1>Share Your Experience</h1>
<div class="subtitle">Your review will be generated automatically</div>

<form id="reviewForm">
    <div class="section">
    <label>Select services</label>
    <div class="note">You can select multiple services</div>


<div class="services">

<label><input type="checkbox" name="services" value="GMB Management"> GMB Management</label>
<label><input type="checkbox" name="services" value="Local SEO"> Local SEO</label>
<label><input type="checkbox" name="services" value="SEO"> SEO</label>
<label><input type="checkbox" name="services" value="Social Media Marketing"> Social Media Marketing</label>
<label><input type="checkbox" name="services" value="Website Development"> Website Development</label>
<label><input type="checkbox" name="services" value="Lead Generation"> Lead Generation</label>

</div>

<input type="text" id="location" placeholder="Your City / Area">

<button type="submit">Generate My Review</button>

</form>

<div id="status" class="status"></div>

<textarea id="review" readonly placeholder="Your review will appear here"></textarea>

</div>

<div id="popup" class="popup">
📱 Tap & Hold → Paste your review on Google
</div>

<script>

const webhookURL="https://hook.us2.make.com/0gkgw9kdw46a3csmg5dqn9jqug03y1go";
const googleURL="https://search.google.com/local/writereview?placeid=ChIJQWh0uNEbw2MRWT7vlIaLRLQ";

document.getElementById("reviewForm").addEventListener("submit",async e=>{
e.preventDefault();

const status=document.getElementById("status");
const location=document.getElementById("location").value.trim();

status.innerText="Generating your review...";

const services=[...document.querySelectorAll("input[name=services]:checked")].map(i=>i.value);

if(!services.length){
alert("Please select at least one service");
status.innerText="";
return;
}

try{

const r=await fetch(webhookURL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({services,location})
});

let text=await r.text();
text=text.trim();

console.log("Webhook response:",text);

if(!text){
throw new Error("Empty response");
}

document.getElementById("review").value=text;

await navigator.clipboard.writeText(text);

status.innerText="✅ Review copied successfully!";

showConfetti();

document.getElementById("popup").style.display="block";

setTimeout(()=>{
window.open(googleURL,"_blank");
},1500);

}catch(err){

console.error(err);
status.innerText="⚠️ Review generation failed. Please try again.";

}

});


// CONFETTI

const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let confetti=[];

function showConfetti(){

confetti=[];

for(let i=0;i<120;i++){
confetti.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height-200,
r:Math.random()*6+4,
color:`hsl(${Math.random()*360},70%,60%)`
});
}

animateConfetti();

}

function animateConfetti(){

ctx.clearRect(0,0,canvas.width,canvas.height);

confetti.forEach(c=>{
ctx.beginPath();
ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
ctx.fillStyle=c.color;
ctx.fill();
c.y+=3;
});

requestAnimationFrame(animateConfetti);

}

</script>

</body>
</html>
